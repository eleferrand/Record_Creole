<!DOCTYPE html>
<html>
<head>
  <title>Audio Recorder</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f2f5; }
    #box { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; margin: 10px; }
    #start { background: #28a745; color: white; }
    #stop { background: #dc3545; color: white; display: none; }
  </style>
</head>
<body>
  <div id="box">
    <h2 id="caption">Loading caption...</h2>
    <button id="start">Start Recording</button>
    <button id="stop">Stop & Save</button>
    <p id="status">Ready</p>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz6ePHwv5sGv8wrHE-s0pSlbapFhU2ryowS2xZJ-JnZGyOHwN3zIdHY76TCHsx52ir4Wg/exec';
    let mediaRecorder;
    let chunks = [];
    let currentCaption = "";

    // Load Caption from Google (The Bypass Version)
fetch(SCRIPT_URL)
    .then(response => response.text()) // Use .text() instead of .json()
    .then(text => {
      // Split the long string back into a list
      const data = text.split('|'); 
      
      if (data.length > 0 && !data[0].includes("Error")) {
        currentCaption = data[Math.floor(Math.random() * data.length)];
        document.getElementById('caption').innerText = currentCaption;
      } else {
        document.getElementById('caption').innerText = "Check Sheet Connection";
      }
    })
    .catch(err => {
      console.error("Fetch failed:", err);
      document.getElementById('caption').innerText = "Network Error - Try Refreshing";
    });

    document.getElementById('start').onclick = async () => {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      chunks = [];
      mediaRecorder.ondataavailable = e => chunks.push(e.data);
      mediaRecorder.onstop = upload;
      mediaRecorder.start();
      document.getElementById('start').style.display = 'none';
      document.getElementById('stop').style.display = 'inline-block';
    };

    document.getElementById('stop').onclick = () => mediaRecorder.stop();

    async function upload() {
      const status = document.getElementById('status');
      status.innerText = "Uploading...";
    
      const blob = new Blob(chunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.readAsDataURL(blob);
      
      reader.onloadend = () => {
        const base64 = reader.result.split(',')[1];
    
        // We MUST use URLSearchParams to ensure the browser sees this 
        // as a "Simple Form Submission" which bypasses CORS.
        const formData = new URLSearchParams();
        formData.append('base64', base64);
        formData.append('caption', currentCaption);
    
        // We do NOT use 'await' here because 'no-cors' doesn't return a readable response
        fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors', 
          cache: 'no-cache',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: formData.toString()
        });
    
        // Since we can't 'read' the success from Google, we assume it's working
        // and wait 3 seconds before refreshing.
        status.innerText = "Sending... Please wait.";
        setTimeout(() => {
            status.innerText = "Saved to Drive!";
            setTimeout(() => location.reload(), 1500);
        }, 3000);
      };
    }
  </script>
</body>
</html>
